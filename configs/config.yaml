extraction:
  fps: 30
  window_seconds: 5
  window_frames: 150
  ear_threshold: 0.20
  mar_threshold: 0.50
  yawn_min_duration_ms: 1500
  microsleep_ms: 500

calibration:
  session_baseline_minutes: 5
  weekly_baseline_days: 7
  zscore_clip: 5.0

model:
  input_dim: 20
  encoder_hidden: 64
  encoder_output: 128
  drift_hidden: 64
  dropout: 0.3
  mc_passes: 20

training:
  lr: 1e-3
  batch_size: 32
  epochs: 50
  weight_decay: 1e-4
  patience: 10
  scheduler: cosine

cusum:
  threshold: 5
  slack: 0.5

privacy:
  delete_frames: true
  encrypt_baselines: true
  store_raw_video: false

paths:
  data_raw:       data/raw/
  data_processed: data/processed/
  data_baselines: data/baselines/
  models_output:  models/
  experiments:    experiments/